<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestRise — Quests</title>
  <meta name="description" content="Manage your QuestRise quests. Create tasks, earn XP, and build your stats." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .quests-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 22px;
      align-items: start;
    }
    .quest-form-panel {
      position: sticky;
      top: 20px;
    }
    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .filter-bar input {
      flex: 1;
      min-width: 160px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      outline: none;
    }
    .filter-bar input:focus { border-color: var(--purple); }
    .diff-indicator {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
    }
    .diff-easy   { background: #10b981; }
    .diff-medium { background: #f59e0b; }
    .diff-hard   { background: #ef4444; }
    .diff-epic   { background: #8b5cf6; }
    @media (max-width: 900px) {
      .quests-layout { grid-template-columns: 1fr; }
      .quest-form-panel { position: static; }
    }
  </style>
</head>
<body>
<div id="app-wrapper" class="app-wrapper">
  <main class="main-content">

    <div class="page-header">
      <h2>📋 Quest Planner</h2>
      <p>Create tasks, assign stat categories, earn XP and level up</p>
    </div>

    <div class="quests-layout">

      <!-- Left: Add Quest Form -->
      <div class="quest-form-panel">
        <div class="card card-glow">
          <div class="card-header">
            <span class="card-title">➕ New Quest</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="q-title">Quest Title *</label>
            <input type="text" id="q-title" class="form-input" placeholder="e.g. Morning Run 5km" maxlength="80" />
          </div>

          <div class="form-group">
            <label class="form-label" for="q-desc">Description (optional)</label>
            <textarea id="q-desc" class="form-textarea" placeholder="Details about this quest..." style="min-height:60px;"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="q-category">Category</label>
              <select id="q-category" class="form-select">
                <!-- injected -->
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="q-difficulty">Difficulty</label>
              <select id="q-difficulty" class="form-select">
                <!-- injected -->
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="q-deadline">Deadline</label>
              <input type="date" id="q-deadline" class="form-input" />
            </div>
            <div class="form-group">
              <label class="form-label" for="q-recurring">Recurring</label>
              <select id="q-recurring" class="form-select">
                <option value="">One-time</option>
                <option value="daily">Daily 🔄</option>
                <option value="weekly">Weekly 🗓️</option>
              </select>
            </div>
          </div>

          <!-- XP Preview -->
          <div id="xp-preview" style="background:rgba(240,180,41,0.07);border:1px solid var(--border-gold);border-radius:var(--radius);padding:12px;margin-bottom:16px;text-align:center;">
            <div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">Estimated Reward</div>
            <div style="font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold)" id="xp-preview-val">-- XP</div>
            <div style="font-size:0.73rem;color:var(--text-secondary);margin-top:3px;" id="stat-preview-val">-- stat gain</div>
          </div>

          <button class="btn btn-gold btn-block btn-lg" id="btn-add-quest" onclick="addQuest()">
            ⚔️ Add Quest
          </button>
        </div>
      </div>

      <!-- Right: Quest List -->
      <div>
        <!-- Filter bar -->
        <div class="filter-bar">
          <input type="text" id="quest-search" placeholder="🔍 Search quests..." oninput="renderQuestList()" />
          <select id="quest-cat-filter" class="form-select" style="width:auto;padding:8px 12px;font-size:0.83rem;" onchange="renderQuestList()">
            <option value="">All Categories</option>
          </select>
        </div>

        <!-- Tabs -->
        <div class="tabs" role="tablist" id="quest-tabs">
          <button class="tab-btn active" id="tab-active"   onclick="switchTab('active')"    role="tab" aria-selected="true">🔥 Active</button>
          <button class="tab-btn"         id="tab-today"   onclick="switchTab('today')"     role="tab" aria-selected="false">📅 Today</button>
          <button class="tab-btn"         id="tab-completed" onclick="switchTab('completed')" role="tab" aria-selected="false">✅ Completed</button>
          <button class="tab-btn"         id="tab-all"     onclick="switchTab('all')"       role="tab" aria-selected="false">📋 All</button>
        </div>

        <!-- Quest count -->
        <div style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:0.78rem;color:var(--text-muted);" id="quest-count-label">0 quests</span>
          <button class="btn btn-outline btn-sm" onclick="sortQuests()" id="btn-sort">Sort by Deadline</button>
        </div>

        <!-- Quest list -->
        <div id="quest-list"><!-- injected --></div>
      </div>

    </div>
  </main>
</div>

<!-- Delete confirmation modal -->
<div class="modal-backdrop" id="delete-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <div class="modal-title">Delete Quest?</div>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:22px;">
      Are you sure you want to delete this quest? This cannot be undone.
    </p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1;" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" style="flex:1;" id="confirm-delete-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
let currentTab = 'active';
let sortByDeadline = false;
let pendingDeleteId = null;

function initPage() {
  injectNav();
  buildFormSelects();
  renderQuestList();
  updateXPPreview();

  // Set today as default deadline
  document.getElementById('q-deadline').value = todayStr();

  // Live XP preview
  ['q-category','q-difficulty'].forEach(id => {
    document.getElementById(id).addEventListener('change', updateXPPreview);
  });
}

function buildFormSelects() {
  const catSel = document.getElementById('q-category');
  catSel.innerHTML = Object.entries(CATEGORIES).map(([k, v]) =>
    `<option value="${k}">${v.icon} ${v.label} → +${STATS[v.stat].short}</option>`
  ).join('');

  const diffSel = document.getElementById('q-difficulty');
  diffSel.innerHTML = Object.entries(DIFFICULTIES).map(([k, v]) =>
    `<option value="${k}">${v.icon} ${v.label} (×${v.multiplier})</option>`
  ).join('');
  diffSel.value = 'medium';

  // Filter category dropdown
  const filterCat = document.getElementById('quest-cat-filter');
  filterCat.innerHTML = '<option value="">All Categories</option>' +
    Object.entries(CATEGORIES).map(([k, v]) =>
      `<option value="${k}">${v.icon} ${v.label}</option>`
    ).join('');
}

function updateXPPreview() {
  const cat = document.getElementById('q-category').value;
  const diff = document.getElementById('q-difficulty').value;
  const catInfo = CATEGORIES[cat] || CATEGORIES.other;
  const diffInfo = DIFFICULTIES[diff] || DIFFICULTIES.medium;
  const char = getCharacter();

  let classBonus = 1.0;
  if (char) {
    const primaryCat = getPrimaryCategory(char.class);
    if (cat === primaryCat) classBonus = 1.2;
  }

  const xp = Math.round(catInfo.xp * diffInfo.multiplier * classBonus);
  const stat = Math.ceil(catInfo.xp * diffInfo.multiplier / 25);
  const bonusTxt = classBonus > 1 ? ' ✨ Class Bonus!' : '';

  document.getElementById('xp-preview-val').textContent = `+${xp} XP${bonusTxt}`;
  document.getElementById('stat-preview-val').textContent = `+${stat} ${STATS[catInfo.stat].short}`;
}

function addQuest() {
  const title = document.getElementById('q-title').value.trim();
  if (!title) {
    showToast('Please enter a quest title!', 'warning');
    document.getElementById('q-title').focus();
    return;
  }

  const quest = createQuest({
    title,
    description: document.getElementById('q-desc').value.trim(),
    category:    document.getElementById('q-category').value,
    difficulty:  document.getElementById('q-difficulty').value,
    deadline:    document.getElementById('q-deadline').value,
    recurring:   document.getElementById('q-recurring').value || null
  });

  if (quest) {
    showToast(`⚔️ Quest added: "${quest.title}"`, 'success');
    document.getElementById('q-title').value = '';
    document.getElementById('q-desc').value = '';
    document.getElementById('q-deadline').value = todayStr();
    document.getElementById('q-recurring').value = '';
    renderQuestList();
    updateXPPreview();
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.id === 'tab-' + tab);
    b.setAttribute('aria-selected', b.id === 'tab-' + tab);
  });
  renderQuestList();
}

function sortQuests() {
  sortByDeadline = !sortByDeadline;
  document.getElementById('btn-sort').textContent = sortByDeadline ? 'Sort by Newest' : 'Sort by Deadline';
  renderQuestList();
}

let questListTimer = null;

function renderQuestList() {
  const container = document.getElementById('quest-list');
  const today = todayStr();
  const search = document.getElementById('quest-search').value.toLowerCase();
  const catFilter = document.getElementById('quest-cat-filter').value;

  let quests = getQuests();

  // Filter by tab
  switch (currentTab) {
    case 'active':
      quests = quests.filter(q => !q.completed);
      break;
    case 'today':
      quests = quests.filter(q => !q.completed && q.deadline === today);
      break;
    case 'completed':
      quests = quests.filter(q => q.completed);
      break;
    // 'all': no filter
  }

  // Search
  if (search) quests = quests.filter(q => q.title.toLowerCase().includes(search));
  if (catFilter) quests = quests.filter(q => q.category === catFilter);

  // Sort
  if (sortByDeadline) {
    quests.sort((a,b) => {
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return a.deadline.localeCompare(b.deadline);
    });
  }

  document.getElementById('quest-count-label').textContent = `${quests.length} quest${quests.length !== 1 ? 's' : ''}`;

  if (quests.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">📋</span>
        <p>${currentTab === 'completed' ? 'No completed quests yet. Start one!' : 'No quests here. Add one on the left!'}</p>
      </div>`;
    stopCooldownTicker();
    return;
  }

  container.innerHTML = quests.map(q => {
    const cat = CATEGORIES[q.category] || CATEGORIES.other;
    const isOverdue = !q.completed && q.deadline && q.deadline < today;
    const isToday   = q.deadline === today;
    const diffInfo  = DIFFICULTIES[q.difficulty] || DIFFICULTIES.medium;
    const cd        = !q.completed ? questCooldownStatus(q) : { ready: true, remaining: null };
    const isLocked  = !q.completed && !cd.ready;

    return `
      <div class="quest-card ${q.completed ? 'completed' : ''} ${isLocked ? 'quest-locked' : ''} ${q.recurring ? 'recurring' : ''}" id="qc-${q.id}">
        <div class="quest-check ${q.completed ? 'checked' : isLocked ? 'locked-check' : ''}"
             onclick="${q.completed || isLocked ? '' : `completeQuestUI('${q.id}')`}"
             title="${q.completed ? 'Completed' : isLocked ? 'Locked — cooldown active' : 'Mark as complete'}">
          ${q.completed ? '✓' : isLocked ? '🔒' : ''}
        </div>
        <div class="quest-info">
          <div class="quest-title">${q.title}</div>
          ${q.description ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">${q.description}</div>` : ''}
          <div class="quest-meta">
            <span class="tag tag-${q.statKey}">${cat.icon} ${cat.label}</span>
            <span class="xp-badge">+${q.xpReward} XP</span>
            <span style="font-size:0.72rem;color:var(--text-muted)">${diffInfo.icon} ${diffInfo.label}</span>
            <span class="tag tag-${q.statKey}" style="font-size:0.68rem;">+${q.statGain} ${STATS[q.statKey]?.short}</span>
            ${q.deadline ? `<span class="quest-deadline ${isOverdue ? 'overdue' : ''}">
              ${isOverdue ? '⚠️ Overdue' : isToday ? '📅 Today' : '📅 ' + formatDate(q.deadline)}
              ${q.recurring ? `🔄 ${q.recurring}` : ''}
            </span>` : ''}
            ${q.completed ? `<span style="color:var(--agi);font-size:0.72rem;">✅ ${formatDate(q.completedAt)}</span>` : ''}
            ${isLocked ? `<span class="cooldown-badge" id="cd-badge-${q.id}">⏳ Ready in ${cd.remaining}</span>` : ''}
          </div>
        </div>
        <div class="quest-actions">
          ${!q.completed
            ? isLocked
              ? `<button class="btn btn-sm" style="background:rgba(245,158,11,0.1);color:var(--vit);cursor:not-allowed;border:1px solid rgba(245,158,11,0.3);" disabled title="Wait for cooldown">⏳</button>`
              : `<button class="btn btn-success btn-sm" onclick="completeQuestUI('${q.id}')" title="Complete">✓</button>`
            : ''}
          <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${q.id}')" title="Delete">🗑️</button>
        </div>
      </div>
    `;
  }).join('');

  // Tick cooldown timers live
  startCooldownTicker(quests.filter(q => !q.completed && !questCooldownStatus(q).ready));
}

function startCooldownTicker(lockedQuests) {
  stopCooldownTicker();
  if (lockedQuests.length === 0) return;

  questListTimer = setInterval(() => {
    let allReady = true;
    lockedQuests.forEach(q => {
      const cd = questCooldownStatus(q);
      const badge = document.getElementById('cd-badge-' + q.id);
      if (badge) {
        if (cd.ready) {
          // Cooldown just expired — re-render the whole list
          clearInterval(questListTimer);
          questListTimer = null;
          renderQuestList();
          showToast('🔓 A quest is now ready to complete!', 'info');
          return;
        }
        badge.textContent = `⏳ Ready in ${cd.remaining}`;
        allReady = false;
      }
    });
    if (allReady) stopCooldownTicker();
  }, 1000);
}

function stopCooldownTicker() {
  if (questListTimer) { clearInterval(questListTimer); questListTimer = null; }
}

function completeQuestUI(id) {
  const result = completeQuest(id);
  if (result) {
    showToast(`✅ +${result.xpReward} XP! +${result.statGain} ${STATS[result.statKey]?.short}`, 'success');
    setTimeout(() => renderQuestList(), 300);
  }
  // If null, completeQuest already showed the cooldown toast
}

function openDeleteModal(id) {
  pendingDeleteId = id;
  document.getElementById('delete-modal').classList.add('active');
}

function closeDeleteModal() {
  pendingDeleteId = null;
  document.getElementById('delete-modal').classList.remove('active');
}

function confirmDelete() {
  if (pendingDeleteId) {
    deleteQuest(pendingDeleteId);
    closeDeleteModal();
    renderQuestList();
    showToast('Quest deleted', 'info');
  }
}
</script>
</body>
</html>
