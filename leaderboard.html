<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestRise — Leaderboard</title>
  <meta name="description" content="QuestRise leaderboard. See where you rank among the world's heroes." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .lb-header {
      background: linear-gradient(135deg, rgba(240,180,41,0.12), rgba(139,92,246,0.06));
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-xl);
      padding: 24px;
      text-align: center;
      margin-bottom: 22px;
      box-shadow: var(--glow-gold);
    }
    .lb-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .top-podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 16px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    .podium-place {
      text-align: center;
      padding: 16px 20px;
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      border: 1px solid var(--border);
      min-width: 140px;
      transition: all 0.2s;
    }
    .podium-place:hover { transform: translateY(-4px); }
    .podium-1 {
      border-color: rgba(255,215,0,0.4);
      background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,165,0,0.04));
      box-shadow: 0 0 24px rgba(255,215,0,0.15);
      padding-bottom: 24px;
    }
    .podium-2 { border-color: rgba(192,192,192,0.3); background: linear-gradient(135deg, rgba(192,192,192,0.06), transparent); }
    .podium-3 { border-color: rgba(205,127,50,0.3); background: linear-gradient(135deg, rgba(205,127,50,0.06), transparent); }

    .podium-crown { font-size: 1.8rem; margin-bottom: 6px; }
    .podium-avatar { font-size: 2rem; margin: 8px 0 6px; }
    .podium-name { font-weight: 600; font-size: 0.85rem; color: var(--text-primary); margin-bottom: 3px; }
    .podium-level { font-size: 0.75rem; color: var(--text-muted); }
    .podium-xp { font-family: 'Cinzel', serif; font-size: 0.82rem; color: var(--gold); margin-top: 5px; }

    .lb-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      align-items: center;
    }
    .lb-filters .filter-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-right: 4px;
    }

    .lb-table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }

    .lb-user-rank {
      background: rgba(139,92,246,0.08);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-mini-bar {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      width: 60px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
      margin-left: 6px;
    }
    .stat-mini-fill { height: 100%; border-radius: 999px; }
  </style>
</head>
<body>
<div id="app-wrapper" class="app-wrapper">
  <main class="main-content">

    <!-- Leaderboard Header -->
    <div class="lb-header">
      <h2>🏆 Hall of Legends</h2>
      <p style="color:var(--text-secondary);font-size:0.875rem;">The greatest heroes of the realm, ranked by power</p>
    </div>

    <!-- Your Rank Banner -->
    <div class="lb-user-rank" id="your-rank-banner">
      <!-- injected -->
    </div>

    <!-- Top 3 Podium -->
    <div class="card card-gold" style="margin-bottom:22px;">
      <div class="card-header">
        <span class="card-title" style="color:var(--gold)">👑 Top Champions</span>
      </div>
      <div class="top-podium" id="top-podium"><!-- injected --></div>
    </div>

    <!-- Filter Row -->
    <div class="lb-filters">
      <span class="filter-label">Filter by Class:</span>
      <button class="tab-btn active" id="lb-filter-all"      onclick="filterLB('')">🌍 All</button>
      <button class="tab-btn"        id="lb-filter-warrior"  onclick="filterLB('warrior')">⚔️ Warrior</button>
      <button class="tab-btn"        id="lb-filter-scholar"  onclick="filterLB('scholar')">📚 Scholar</button>
      <button class="tab-btn"        id="lb-filter-merchant" onclick="filterLB('merchant')">💰 Merchant</button>
      <button class="tab-btn"        id="lb-filter-healer"   onclick="filterLB('healer')">💚 Healer</button>
      <button class="tab-btn"        id="lb-filter-ranger"   onclick="filterLB('ranger')">🏹 Ranger</button>
      <button class="tab-btn"        id="lb-filter-mage"     onclick="filterLB('mage')">✨ Mage</button>
    </div>

    <!-- Main Table -->
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="lb-table-wrap">
        <table class="leaderboard-table" id="lb-table" aria-label="Leaderboard rankings">
          <thead>
            <tr>
              <th style="width:50px">Rank</th>
              <th>Hero</th>
              <th>Class</th>
              <th>Level</th>
              <th>Total XP</th>
              <th style="min-width:200px">Top Stats</th>
            </tr>
          </thead>
          <tbody id="lb-body"><!-- injected --></tbody>
        </table>
      </div>
    </div>

    <!-- Season Notice -->
    <div style="text-align:center;margin-top:20px;color:var(--text-muted);font-size:0.75rem;">
      🌟 QuestRise Season 1 · Rankings reset monthly · Real multiplayer coming soon
    </div>

  </main>
</div>

<script src="js/app.js"></script>
<script>
let currentLBFilter = '';

function initPage() {
  injectNav();
  renderUserRankBanner();
  renderLB('');
}

function filterLB(cls) {
  currentLBFilter = cls;
  document.querySelectorAll('.lb-filters .tab-btn').forEach(b => {
    b.classList.toggle('active', b.id === 'lb-filter-' + (cls || 'all'));
  });
  renderLB(cls);
}

function renderUserRankBanner() {
  const char = getCharacter();
  const banner = document.getElementById('your-rank-banner');
  if (!char) { banner.style.display = 'none'; return; }

  const lb = getLeaderboard();
  const myEntry = lb.find(p => p.isUser);
  const cls = CLASSES[char.class];

  banner.innerHTML = `
    <div style="font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:var(--purple-light)">
      #${myEntry?.rank || '?'}
    </div>
    <div style="font-size:1.8rem;">${cls.emoji}</div>
    <div>
      <div style="font-weight:600;font-size:0.95rem;color:var(--text-primary)">
        ${char.name} <span style="color:var(--purple-light);font-size:0.8rem;">(You)</span>
      </div>
      <div style="font-size:0.78rem;color:var(--text-secondary);">
        Level ${char.level} ${cls.name} · ${(char.totalXp || 0).toLocaleString()} Total XP
      </div>
    </div>
    <div style="margin-left:auto;text-align:right;">
      <div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:4px;">Your next level</div>
      <div style="width:140px;">
        <div class="xp-bar-bg">
          <div class="xp-bar-fill" style="width:${Math.round((char.xp/char.xpToNext)*100)}%"></div>
        </div>
        <div style="font-size:0.68rem;color:var(--text-muted);margin-top:3px;">${char.xp} / ${char.xpToNext} XP</div>
      </div>
    </div>
  `;
}

function renderLB(classFilter) {
  const lb = getLeaderboard(classFilter || null);
  const char = getCharacter();

  // Render top 3 podium
  renderPodium(lb.slice(0, 3));

  // Render full table
  const tbody = document.getElementById('lb-body');
  tbody.innerHTML = lb.map(p => {
    const cls = CLASSES[p.class];
    const isUser = p.isUser || (char && p.id === char.id);
    const topStats = Object.entries(p.stats || {})
      .sort((a,b) => b[1]-a[1])
      .slice(0,3)
      .map(([k,v]) => `
        <span style="font-size:0.78rem;color:var(--${k});font-weight:600;margin-right:6px;">
          ${STATS[k].short} ${v}
        </span>
      `).join('');

    return `
      <tr class="${isUser ? 'current-user' : ''}">
        <td>
          <div class="rank-badge ${p.rank <= 3 ? 'rank-' + p.rank : 'rank-other'}">
            ${p.rank <= 3 ? ['🥇','🥈','🥉'][p.rank-1] : p.rank}
          </div>
        </td>
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="lb-avatar" style="background:rgba(0,0,0,0.3);">${cls.emoji}</div>
            <div>
              <div style="font-weight:600;font-size:0.88rem;">${p.name}${isUser ? ' <span style="color:var(--purple-light);font-size:0.72rem;">(You)</span>' : ''}</div>
              <div style="font-size:0.7rem;color:var(--text-muted);">${p.class.charAt(0).toUpperCase() + p.class.slice(1)}</div>
            </div>
          </div>
        </td>
        <td><span class="tag tag-${p.class}">${cls.emoji} ${cls.name}</span></td>
        <td>
          <div style="font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--gold)">
            ${p.level}
          </div>
        </td>
        <td>
          <div style="font-weight:600;color:var(--text-primary);">${(p.xp || 0).toLocaleString()}</div>
          <div style="font-size:0.68rem;color:var(--text-muted);">XP</div>
        </td>
        <td style="white-space:nowrap">${topStats}</td>
      </tr>
    `;
  }).join('');
}

function renderPodium(top3) {
  const podium = document.getElementById('top-podium');

  const podiumOrder = [
    { idx: 1, pos: 'podium-2', crown: '🥈', height: '' },
    { idx: 0, pos: 'podium-1', crown: '👑', height: 'padding-top:30px;' },
    { idx: 2, pos: 'podium-3', crown: '🥉', height: '' }
  ];

  podium.innerHTML = podiumOrder.map(po => {
    const p = top3[po.idx];
    if (!p) return '';
    const cls = CLASSES[p.class];
    return `
      <div class="podium-place ${po.pos}" style="${po.height}">
        <div class="podium-crown">${po.crown}</div>
        <div class="podium-avatar">${cls.emoji}</div>
        <div class="podium-name">${p.name}</div>
        <div style="margin:4px 0;"><span class="tag tag-${p.class}">${cls.name}</span></div>
        <div class="podium-level">Level ${p.level}</div>
        <div class="podium-xp">${(p.xp || 0).toLocaleString()} XP</div>
        ${p.isUser ? '<div style="color:var(--purple-light);font-size:0.72rem;margin-top:4px;">👤 You!</div>' : ''}
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
