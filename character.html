<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestRise — Character Sheet</title>
  <meta name="description" content="View your QuestRise character sheet: class, stats, skills, and achievements." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .char-header-card {
      background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(59,130,246,0.06));
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-xl);
      padding: 30px;
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 22px;
      box-shadow: var(--glow-purple);
    }
    .char-big-avatar {
      width: 100px; height: 100px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      border: 3px solid var(--border-bright);
      box-shadow: var(--glow-purple);
      flex-shrink: 0;
      position: relative;
    }
    .char-level-ring {
      position: absolute;
      bottom: -6px; right: -6px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #1a0a00;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.3);
    }
    .skill-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .achievement-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .stat-full-bar { height: 8px; }
    .class-color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .duel-record {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .record-stat {
      text-align: center;
    }
    .record-val {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .record-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<div id="app-wrapper" class="app-wrapper">
  <main class="main-content">

    <div class="page-header">
      <h2>⚔️ Character Sheet</h2>
      <p>Your hero's stats, skills, and achievements</p>
    </div>

    <!-- Character Header -->
    <div class="char-header-card" id="char-header">
      <div class="char-big-avatar" id="char-avatar">
        <span id="char-emoji">?</span>
        <div class="char-level-ring" id="char-level-ring">Lv.1</div>
      </div>
      <div style="flex:1;">
        <div style="font-family:'Cinzel',serif;font-size:1.8rem;color:var(--text-primary);margin-bottom:5px;" id="char-name">Hero</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
          <span class="tag" id="char-class-tag">...</span>
          <span style="color:var(--text-secondary);font-size:0.83rem;" id="char-title">...</span>
          <span style="color:var(--text-muted);font-size:0.78rem;" id="char-joined">Joined ...</span>
        </div>
        <div id="char-xp-bar"></div>
      </div>
    </div>

    <!-- Stats + Skills + Records -->
    <div class="grid-2" style="gap:22px;margin-bottom:22px;">

      <!-- Stats -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">📊 Stats</span>
          <span style="font-size:0.75rem;color:var(--text-muted)">Grows as you complete quests</span>
        </div>
        <div id="char-stat-bars"><!-- injected --></div>
        <hr class="divider" />
        <div class="duel-record" id="char-duel-record"><!-- injected --></div>
      </div>

      <!-- Skills & Class Info -->
      <div style="display:flex;flex-direction:column;gap:22px;">
        <div class="card">
          <div class="card-header">
            <span class="card-title">✨ Class Skills</span>
            <span style="font-size:0.75rem;color:var(--text-muted)" id="class-bonus-label">Active bonuses</span>
          </div>
          <div class="skill-grid" id="char-skills"><!-- injected --></div>
        </div>

        <div class="card card-gold">
          <div class="card-header">
            <span class="card-title" style="color:var(--gold)">📈 Progress Summary</span>
          </div>
          <div id="char-progress-summary" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><!-- injected --></div>
        </div>
      </div>

    </div>

    <!-- Achievements -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">🏅 Achievements</span>
        <span id="ach-count" style="font-size:0.8rem;color:var(--text-muted)">0 / 0</span>
      </div>
      <div class="achievement-grid" id="achievements"><!-- injected --></div>
    </div>

  </main>
</div>

<script src="js/app.js"></script>
<script>
function initPage() {
  injectNav();
  renderCharacterSheet();
}

function renderCharacterSheet() {
  const char = getCharacter();
  if (!char) return;
  const cls = CLASSES[char.class];

  // Header
  document.getElementById('char-emoji').textContent = cls.emoji;
  document.getElementById('char-level-ring').textContent = `Lv.${char.level}`;
  document.getElementById('char-name').textContent = char.name;

  const classTag = document.getElementById('char-class-tag');
  classTag.className = `tag tag-${char.class}`;
  classTag.textContent = `${cls.emoji} ${cls.name}`;

  document.getElementById('char-title').textContent = char.title || '';
  document.getElementById('char-joined').textContent = 'Joined ' + formatDate(char.createdAt);
  renderXPBar(char, 'char-xp-bar');

  // Color the big avatar background with class color
  document.querySelector('.char-big-avatar').style.background =
    `linear-gradient(135deg, ${cls.color}33, ${cls.color}11)`;

  // Stat bars
  renderStatBarsDetailed(char.stats);

  // Duel record
  const duelEl = document.getElementById('char-duel-record');
  const total = (char.duelsWon || 0) + (char.duelsLost || 0);
  const rate = total > 0 ? Math.round((char.duelsWon / total) * 100) : 0;
  duelEl.innerHTML = `
    <div class="record-stat">
      <div class="record-val" style="color:var(--green)">${char.duelsWon || 0}</div>
      <div class="record-label">Wins ⚔️</div>
    </div>
    <div class="record-stat">
      <div class="record-val" style="color:var(--red)">${char.duelsLost || 0}</div>
      <div class="record-label">Losses 💀</div>
    </div>
    <div class="record-stat">
      <div class="record-val" style="color:var(--gold)">${rate}%</div>
      <div class="record-label">Win Rate</div>
    </div>
    <div class="record-stat">
      <div class="record-val" style="color:var(--purple-light)">${char.questsCompleted || 0}</div>
      <div class="record-label">Quests ✅</div>
    </div>
    <div class="record-stat">
      <div class="record-val" style="color:var(--vit)">${char.streak || 0}</div>
      <div class="record-label">Day Streak 🔥</div>
    </div>
  `;

  // Skills
  const skillEl = document.getElementById('char-skills');
  document.getElementById('class-bonus-label').textContent = cls.name + ' perks';
  skillEl.innerHTML = cls.skills.map(s => `
    <div class="skill-card">
      <div class="skill-icon">${s.icon}</div>
      <div>
        <div class="skill-name">${s.name}</div>
        <div class="skill-desc">${s.desc}</div>
      </div>
    </div>
  `).join('');

  // Progress summary
  const pEl = document.getElementById('char-progress-summary');
  const topStat = Object.entries(char.stats).sort((a,b) => b[1]-a[1])[0];
  const totalStatPoints = Object.values(char.stats).reduce((a,b) => a+b, 0);
  pEl.innerHTML = `
    <div style="text-align:center;">
      <div style="font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;color:var(--gold)">${char.totalXp || 0}</div>
      <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Total XP Earned</div>
    </div>
    <div style="text-align:center;">
      <div style="font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;color:var(--purple-light)">${char.level}</div>
      <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Current Level</div>
    </div>
    <div style="text-align:center;">
      <div style="font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;color:var(--${topStat[0]})">${topStat[1]}</div>
      <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Top Stat (${STATS[topStat[0]].short})</div>
    </div>
    <div style="text-align:center;">
      <div style="font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;color:var(--green)">${totalStatPoints}</div>
      <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Total Stat Points</div>
    </div>
  `;

  // Achievements
  renderAchievements(char.achievements || []);
}

function renderStatBarsDetailed(stats) {
  const container = document.getElementById('char-stat-bars');
  const order = ['str','int','agi','vit','cha','lck'];
  const maxVal = 200;

  container.innerHTML = order.map(key => {
    const val = stats[key] || 10;
    const pct = Math.min(100, (val / maxVal) * 100);
    const info = STATS[key];
    return `
      <div class="stat-item stat-${key}">
        <div class="stat-header">
          <span class="stat-name">${info.icon} ${info.short} — ${info.label}</span>
          <span class="stat-value">${val}</span>
        </div>
        <div class="stat-bar stat-full-bar">
          <div class="stat-bar-fill" style="width:0%" data-target="${pct}%"></div>
        </div>
      </div>
    `;
  }).join('');

  setTimeout(() => {
    container.querySelectorAll('.stat-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.target;
    });
  }, 150);
}

function renderAchievements(unlocked) {
  const container = document.getElementById('achievements');
  document.getElementById('ach-count').textContent = `${unlocked.length} / ${ACHIEVEMENTS.length}`;

  container.innerHTML = ACHIEVEMENTS.map(ach => {
    const done = unlocked.includes(ach.id);
    return `
      <div class="achievement-badge ${done ? '' : 'locked'}" title="${done ? 'Unlocked!' : 'Locked: ' + ach.desc}">
        <div class="badge-icon">${ach.icon}</div>
        <div>
          <div class="badge-name">${ach.name}</div>
          <div class="badge-desc">${ach.desc}</div>
        </div>
        ${done ? '<span style="margin-left:auto;color:var(--green);font-size:0.8rem;">✓</span>' : ''}
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
