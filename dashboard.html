<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestRise — Dashboard</title>
  <meta name="description" content="Your QuestRise dashboard. Track XP, stats, quests, and active duels." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app-wrapper" class="app-wrapper">

  <!-- Main Content (sidebar injected by app.js) -->
  <main class="main-content" id="main-content">

    <!-- Dashboard Hero -->
    <div class="dashboard-hero" id="dashboard-hero">
      <div class="hero-avatar" id="hero-avatar">?</div>
      <div class="hero-info">
        <div class="hero-name" id="hero-name">Loading...</div>
        <div class="hero-meta">
          <div class="level-badge" id="hero-level-badge">
            <span>Level</span><span class="level-num" id="hero-level-num">1</span>
          </div>
          <span class="tag" id="hero-class-tag">...</span>
          <div id="hero-title" style="color:var(--text-muted);font-size:0.78rem;"></div>
        </div>
        <div id="hero-xp-bar"><!-- injected --></div>
      </div>
    </div>

    <!-- Stat Chips -->
    <div class="grid-6" id="stat-chips" style="margin-bottom:22px;">
      <!-- injected -->
    </div>

    <!-- Main Grid -->
    <div class="grid-2" style="gap:22px;">

      <!-- Left Column -->
      <div style="display:flex;flex-direction:column;gap:22px;">

        <!-- Today's Quests -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">📋 Today's Quests</span>
            <a href="quests.html" class="btn btn-outline btn-sm" id="btn-view-all-quests">View All</a>
          </div>
          <div id="today-quests"><!-- injected --></div>
          <a href="quests.html" class="btn btn-primary btn-block" id="btn-add-quest" style="margin-top:14px;">
            + Add Quest
          </a>
        </div>

        <!-- Active Duels -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">⚔️ Active Duels</span>
            <a href="duel.html" class="btn btn-outline btn-sm" id="btn-view-duels">Arena</a>
          </div>
          <div id="active-duels-widget"><!-- injected --></div>
        </div>

      </div>

      <!-- Right Column -->
      <div style="display:flex;flex-direction:column;gap:22px;">

        <!-- Time & Date Widget -->
        <div class="card">
          <div class="time-widget" id="time-widget">
            <div class="time-clock" id="dash-clock">00:00:00</div>
            <div class="time-date" id="dash-date">Loading date...</div>
            <div class="time-day" id="dash-day">Loading...</div>
          </div>
          <hr class="divider" />
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;" id="dash-stats-row">
            <div style="text-align:center;">
              <div style="font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:var(--gold)" id="dash-streak">0</div>
              <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Day Streak 🔥</div>
            </div>
            <div style="width:1px;background:var(--border);"></div>
            <div style="text-align:center;">
              <div style="font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:var(--purple-light)" id="dash-total-quests">0</div>
              <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Quests Done ✅</div>
            </div>
            <div style="width:1px;background:var(--border);"></div>
            <div style="text-align:center;">
              <div style="font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:var(--green)" id="dash-duels-won">0</div>
              <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Duels Won ⚔️</div>
            </div>
          </div>
        </div>

        <!-- Stat Bars -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">📊 Stats Overview</span>
            <a href="character.html" class="btn btn-outline btn-sm" id="btn-view-char">Character</a>
          </div>
          <div id="dash-stat-bars"><!-- injected --></div>
        </div>

        <!-- Recent Activity -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">📜 Recent Activity</span>
          </div>
          <div id="recent-activity"><!-- injected --></div>
        </div>

      </div>
    </div>

  </main>
</div>

<script src="js/app.js"></script>
<script>
function initPage() {
  injectNav();
  renderDashboard();
  startClock();
}

function renderDashboard() {
  const char = getCharacter();
  if (!char) return;
  const cls = CLASSES[char.class];

  // Hero section
  document.getElementById('hero-avatar').textContent = cls.emoji;
  document.getElementById('hero-name').textContent = char.name;
  document.getElementById('hero-level-num').textContent = char.level;
  document.getElementById('hero-class-tag').className = `tag tag-${char.class}`;
  document.getElementById('hero-class-tag').textContent = `${cls.emoji} ${cls.name}`;
  document.getElementById('hero-title').textContent = char.title || '';
  renderXPBar(char, 'hero-xp-bar');

  // Stat chips
  renderStatChips(char.stats);

  // Stat bars
  renderStatBars(char.stats, 'dash-stat-bars');

  // Summary row
  document.getElementById('dash-streak').textContent = char.streak || 0;
  document.getElementById('dash-total-quests').textContent = char.questsCompleted || 0;
  document.getElementById('dash-duels-won').textContent = char.duelsWon || 0;

  // Today's quests
  renderTodayQuests();

  // Active duels widget
  renderActiveDuelsWidget();

  // Activity feed
  renderActivity();
}

function renderStatChips(stats) {
  const container = document.getElementById('stat-chips');
  const order = ['str','int','agi','vit','cha','lck'];
  container.innerHTML = order.map(k => {
    const info = STATS[k];
    return `
      <div class="stat-chip chip-${k}" title="${info.label}">
        <div class="chip-icon">${info.icon}</div>
        <div class="chip-value">${stats[k] || 0}</div>
        <div class="chip-label">${info.short}</div>
      </div>
    `;
  }).join('');
}

function renderTodayQuests() {
  const container = document.getElementById('today-quests');
  const today = todayStr();
  const quests = getQuests().filter(q => !q.completed).slice(0, 5);

  if (quests.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="padding:24px;">
        <span class="empty-icon">📋</span>
        <p>No active quests. Add some to level up!</p>
      </div>`;
    return;
  }

  container.innerHTML = quests.map(q => {
    const cat = CATEGORIES[q.category] || CATEGORIES.other;
    const isToday = q.deadline === today;
    const isOverdue = q.deadline && q.deadline < today;
    return `
      <div class="quest-card" id="qw-${q.id}">
        <div class="quest-check" onclick="quickComplete('${q.id}')" title="Complete quest">
          ${q.completed ? '✓' : ''}
        </div>
        <div class="quest-info">
          <div class="quest-title">${q.title}</div>
          <div class="quest-meta">
            <span class="tag tag-${q.statKey}">${cat.icon} ${cat.label}</span>
            <span class="xp-badge">+${q.xpReward} XP</span>
            ${q.deadline ? `<span class="quest-deadline ${isOverdue ? 'overdue' : ''}">
              ${isOverdue ? '⚠️ Overdue' : isToday ? '📅 Today' : '📅 ' + formatDate(q.deadline)}
            </span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function quickComplete(id) {
  const result = completeQuest(id);
  if (result) {
    showToast(`✅ "${result.title}" completed! +${result.xpReward} XP`, 'success');
    setTimeout(() => renderDashboard(), 400);
  }
}

function renderActiveDuelsWidget() {
  const container = document.getElementById('active-duels-widget');
  const duels = getDuels().filter(d => d.status === 'active').slice(0, 2);

  if (duels.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="padding:20px;">
        <span class="empty-icon">⚔️</span>
        <p>No active duels. Challenge someone!</p>
      </div>
      <a href="duel.html" class="btn btn-outline btn-sm btn-block" style="margin-top:8px;" id="btn-go-duel">Go to Arena</a>`;
    return;
  }

  container.innerHTML = duels.map(d => {
    const cd = countdown(d.deadline);
    return `
      <div class="duel-card ${cd.urgent ? 'active-duel' : ''}">
        <div class="duel-header">
          <span style="font-size:0.78rem;color:var(--text-muted)">vs ${d.opponent.name}</span>
          <span class="countdown ${cd.urgent ? 'urgent' : ''}" id="cd-${d.id}">${cd.text}</span>
        </div>
        <div style="font-size:0.83rem;color:var(--text-secondary);margin-bottom:10px;">"${d.task.title}"</div>
        ${!d.challengerCompleted ? `
          <button class="btn btn-success btn-sm btn-block" onclick="markDuelDone('${d.id}')">
            ✅ Mark as Completed
          </button>` : `
          <div style="color:var(--green);font-size:0.8rem;text-align:center;">✅ You completed this task!</div>`}
      </div>
    `;
  }).join('');

  // Tick countdowns
  setInterval(() => {
    duels.forEach(d => {
      const el = document.getElementById('cd-' + d.id);
      if (!el) return;
      const cd = countdown(d.deadline);
      el.textContent = cd.text;
      el.className = 'countdown' + (cd.urgent ? ' urgent' : '');
    });
  }, 1000);
}

function markDuelDone(id) {
  const result = completeDuelChallenge(id);
  if (result) {
    const won = result.winner === 'challenger';
    showToast(won ? '🏆 You won the duel!' : '😤 You lost this one. Train harder!', won ? 'success' : 'warning');
    setTimeout(() => renderDashboard(), 400);
  }
}

function renderActivity() {
  const container = document.getElementById('recent-activity');
  const activities = getActivity().slice(0, 8);

  if (activities.length === 0) {
    container.innerHTML = `<div class="empty-state" style="padding:16px;"><p>No activity yet. Start a quest!</p></div>`;
    return;
  }

  container.innerHTML = activities.map(a => `
    <div class="activity-item">
      <div class="activity-icon">📌</div>
      <div class="activity-text">${a.text}</div>
      <div class="activity-time">${timeAgo(a.time)}</div>
    </div>
  `).join('');
}

function startClock() {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('dash-clock').textContent = `${h}:${m}:${s}`;
    document.getElementById('dash-date').textContent = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    document.getElementById('dash-day').textContent = days[now.getDay()];
  }
  tick();
  setInterval(tick, 1000);
}
</script>
</body>
</html>
