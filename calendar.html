<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestRise — Calendar</title>
  <meta name="description" content="QuestRise calendar: schedule quests, track habits, and view your progress by day." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .calendar-layout { display: grid; grid-template-columns: 1fr 300px; gap: 22px; align-items: start; }

    .cal-day { min-height: 90px; }

    .day-quest-dot { width: 6px; height: 6px; border-radius: 50%; }

    .day-detail-panel {
      position: sticky;
      top: 20px;
    }

    .cal-time-bar {
      display: flex;
      gap: 16px;
      align-items: center;
      background: rgba(139,92,246,0.06);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 22px;
    }

    .time-icon { font-size: 1.5rem; }
    .time-big {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 2px;
    }
    .time-small { font-size: 0.78rem; color: var(--text-muted); }

    @media (max-width: 900px) {
      .calendar-layout { grid-template-columns: 1fr; }
      .day-detail-panel { position: static; }
    }
  </style>
</head>
<body>
<div id="app-wrapper" class="app-wrapper">
  <main class="main-content">

    <div class="page-header">
      <h2>📅 Calendar</h2>
      <p>Schedule your quests and track your heroic journey over time</p>
    </div>

    <!-- Live Time Bar -->
    <div class="cal-time-bar">
      <div class="time-icon">🕐</div>
      <div>
        <div class="time-big" id="cal-clock">00:00:00</div>
        <div class="time-small" id="cal-full-date">Loading...</div>
      </div>
      <div style="margin-left:auto;text-align:right;">
        <div style="font-family:'Cinzel',serif;font-size:1rem;color:var(--gold)" id="cal-day-name">...</div>
        <div style="font-size:0.73rem;color:var(--text-muted)" id="cal-week-num">Week ...</div>
      </div>
    </div>

    <div class="calendar-layout">

      <!-- Calendar -->
      <div>
        <div class="card">
          <!-- Month Navigation -->
          <div class="cal-nav">
            <button class="cal-nav-btn" id="btn-prev-month" onclick="changeMonth(-1)">‹ Prev</button>
            <h3 id="cal-month-label">Month Year</h3>
            <button class="cal-nav-btn" id="btn-next-month" onclick="changeMonth(1)">Next ›</button>
          </div>

          <!-- Day Headers -->
          <div class="calendar-grid" id="cal-header">
            <!-- injected -->
          </div>

          <!-- Days Grid -->
          <div class="calendar-grid" id="cal-grid" style="margin-top:4px;">
            <!-- injected -->
          </div>
        </div>

        <div class="card" style="margin-top:16px;" id="cal-legend">
          <div style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Category Colors</div>
          <div id="cal-legend-inner" style="display:flex;gap:10px;flex-wrap:wrap;">
            <!-- injected by JS -->
          </div>
        </div>
      </div>

      <!-- Right Panel: Day Detail + Add Quest -->
      <div class="day-detail-panel">

        <!-- Selected Day Quests -->
        <div class="card" style="margin-bottom:16px;">
          <div class="card-header">
            <span class="card-title" id="selected-day-title">📋 Select a Day</span>
          </div>
          <div id="day-quest-list">
            <div class="empty-state" style="padding:20px;">
              <span class="empty-icon">👆</span>
              <p>Click a day to see quests</p>
            </div>
          </div>
        </div>

        <!-- Quick Add for selected day -->
        <div class="card" id="quick-add-card" style="display:none;">
          <div class="card-header">
            <span class="card-title">➕ Quick Add Quest</span>
          </div>
          <div class="form-group">
            <input type="text" id="quick-q-title" class="form-input" placeholder="Quest title..." maxlength="60" />
          </div>
          <div class="form-row" style="margin-bottom:14px;">
            <select id="quick-q-cat" class="form-select">
              <!-- injected -->
            </select>
            <select id="quick-q-diff" class="form-select">
              <option value="easy">🟢 Easy</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="hard">🔴 Hard</option>
              <option value="epic">💎 Epic</option>
            </select>
          </div>
          <button class="btn btn-gold btn-block" id="btn-quick-add" onclick="quickAddQuest()">
            ⚔️ Add to This Day
          </button>
        </div>

        <!-- Monthly Summary -->
        <div class="card" style="margin-top:16px;">
          <div class="card-header">
            <span class="card-title">📊 This Month</span>
          </div>
          <div id="month-summary"><!-- injected --></div>
        </div>

      </div>

    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
// Calendar state
let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedDate = todayStr();

const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function initPage() {
  injectNav();
  startClock();
  buildDayHeaders();
  buildCategorySelect();
  renderCalendar();
  renderDayDetail(selectedDate);
}

function startClock() {
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('cal-clock').textContent = `${h}:${m}:${s}`;

    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    document.getElementById('cal-full-date').textContent = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    document.getElementById('cal-day-name').textContent = days[now.getDay()];

    const start = new Date(now.getFullYear(), 0, 1);
    const week = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
    document.getElementById('cal-week-num').textContent = `Week ${week} of ${now.getFullYear()}`;
  }
  tick();
  setInterval(tick, 1000);
}

function buildDayHeaders() {
  // Day-of-week headers
  const header = document.getElementById('cal-header');
  header.innerHTML = DAYS.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  // Inject legend colours (without duplicating the card)
  const legendInner = document.getElementById('cal-legend-inner');
  if (legendInner) {
    legendInner.innerHTML = Object.entries(CATEGORIES).map(([k, v]) => `
      <div style="display:flex;align-items:center;gap:5px;font-size:0.73rem;color:var(--text-secondary);">
        <div style="width:8px;height:8px;border-radius:50%;background:${v.color};flex-shrink:0;"></div>
        ${v.label}
      </div>`).join('');
  }
}

function buildCategorySelect() {
  const sel = document.getElementById('quick-q-cat');
  sel.innerHTML = Object.entries(CATEGORIES).map(([k,v]) =>
    `<option value="${k}">${v.icon} ${v.label}</option>`
  ).join('');
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  label.textContent = `${MONTHS[currentMonth]} ${currentYear}`;

  const grid = document.getElementById('cal-grid');
  const today = todayStr();
  const allQuests = getQuests();

  // First day of month
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

  const cells = [];

  // Prev month filler days
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrevMonth - i;
    cells.push({ day: d, month: 'prev', dateStr: formatDateStr(currentYear, currentMonth - 1, d) });
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, month: 'cur', dateStr: formatDateStr(currentYear, currentMonth, d) });
  }

  // Next month filler
  const remaining = 42 - cells.length;
  for (let d = 1; d <= remaining; d++) {
    cells.push({ day: d, month: 'next', dateStr: formatDateStr(currentYear, currentMonth + 1, d) });
  }

  grid.innerHTML = cells.map(cell => {
    const isToday = cell.dateStr === today;
    const isSelected = cell.dateStr === selectedDate;
    const isOther = cell.month !== 'cur';

    const dayQuests = allQuests.filter(q => q.deadline === cell.dateStr);
    const completedCount = dayQuests.filter(q => q.completed).length;
    const dots = dayQuests.slice(0, 4).map(q => {
      const cat = CATEGORIES[q.category] || CATEGORIES.other;
      return `<div class="dot" style="background:${cat.color};opacity:${q.completed ? 0.4 : 1};" title="${q.title}"></div>`;
    }).join('');

    return `
      <div class="cal-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${isOther ? 'other-month' : ''}"
           onclick="selectDay('${cell.dateStr}')"
           title="${cell.dateStr}${dayQuests.length > 0 ? ` — ${dayQuests.length} quest${dayQuests.length > 1 ? 's' : ''}` : ''}">
        <span class="day-num">${cell.day}</span>
        ${dayQuests.length > 0 ? `
          <div style="font-size:0.62rem;color:${completedCount === dayQuests.length ? 'var(--agi)' : 'var(--text-muted)'};margin-bottom:2px;">
            ${completedCount}/${dayQuests.length}
          </div>` : ''}
        <div class="day-dots">${dots}</div>
      </div>
    `;
  }).join('');

  renderMonthSummary();
}

function formatDateStr(year, month, day) {
  const realDate = new Date(year, month, day);
  return realDate.toISOString().split('T')[0];
}

function selectDay(dateStr) {
  selectedDate = dateStr;
  renderCalendar(); // re-render to update selected highlight
  renderDayDetail(dateStr);
  document.getElementById('quick-add-card').style.display = 'block';
}

function renderDayDetail(dateStr) {
  const title = document.getElementById('selected-day-title');
  const list = document.getElementById('day-quest-list');
  const today = todayStr();

  const d = new Date(dateStr + 'T00:00:00');
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const label = `${dayNames[d.getDay()]}, ${monthNames[d.getMonth()]} ${d.getDate()}`;
  title.textContent = `📋 ${label}${dateStr === today ? ' (Today)' : ''}`;

  const quests = getQuests().filter(q => q.deadline === dateStr);
  if (quests.length === 0) {
    list.innerHTML = `<div class="empty-state" style="padding:20px;"><span class="empty-icon">📭</span><p>No quests for this day</p></div>`;
    return;
  }

  list.innerHTML = quests.map(q => {
    const cat = CATEGORIES[q.category] || CATEGORIES.other;
    return `
      <div class="quest-card ${q.completed ? 'completed' : ''}">
        <div class="quest-check ${q.completed ? 'checked' : ''}"
             onclick="${q.completed ? '' : `completeFromCal('${q.id}')`}">
          ${q.completed ? '✓' : ''}
        </div>
        <div class="quest-info">
          <div class="quest-title">${q.title}</div>
          <div class="quest-meta">
            <span class="tag tag-${q.statKey}">${cat.icon}</span>
            <span class="xp-badge">+${q.xpReward} XP</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function completeFromCal(id) {
  const result = completeQuest(id);
  if (result) {
    showToast(`✅ +${result.xpReward} XP!`, 'success');
    renderDayDetail(selectedDate);
    renderCalendar();
  }
}

function quickAddQuest() {
  const title = document.getElementById('quick-q-title').value.trim();
  if (!title) {
    showToast('Enter a quest title!', 'warning');
    return;
  }

  createQuest({
    title,
    category: document.getElementById('quick-q-cat').value,
    difficulty: document.getElementById('quick-q-diff').value,
    deadline: selectedDate
  });

  document.getElementById('quick-q-title').value = '';
  showToast(`📅 Quest added for ${selectedDate}`, 'success');
  renderDayDetail(selectedDate);
  renderCalendar();
}

function renderMonthSummary() {
  const container = document.getElementById('month-summary');
  const allQuests = getQuests();
  const monthQuests = allQuests.filter(q => {
    if (!q.deadline) return false;
    const d = new Date(q.deadline);
    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  });

  const total = monthQuests.length;
  const done = monthQuests.filter(q => q.completed).length;
  const totalXp = monthQuests.filter(q => q.completed).reduce((s, q) => s + q.xpReward, 0);
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  container.innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
      <span style="font-size:0.83rem;color:var(--text-secondary)">Completion</span>
      <span style="font-weight:600;color:var(--agi)">${pct}%</span>
    </div>
    <div class="xp-bar-bg" style="margin-bottom:14px;">
      <div class="xp-bar-fill" style="width:${pct}%;"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div style="text-align:center;">
        <div style="font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--purple-light)">${done}</div>
        <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Completed</div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--text-secondary)">${total - done}</div>
        <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Remaining</div>
      </div>
    </div>
    <hr class="divider" />
    <div style="text-align:center;">
      <div style="font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--gold)">${totalXp.toLocaleString()}</div>
      <div style="font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">XP Earned This Month</div>
    </div>
  `;
}
</script>
</body>
</html>
